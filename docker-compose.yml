name: codex

services:
  codex-web:
    build: .
    container_name: codex-credential-manager
    command: ["sh", "/app/scripts/docker-entrypoint.sh"]
    restart: unless-stopped
    ports:
      - "${PORT:-8766}:8766"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: "8766"
      NODE_EXECUTABLE: /usr/bin/node
      ENABLE_SELF_UPDATE: "1"
      UPDATE_SCRIPT: /app/scripts/update-docker.sh
      HOST_INSTALL_DIR: /host-codex
      HOST_BIND_PATH: ${HOST_BIND_PATH:-/www/wwwroot/Codex}
      GITHUB_REPO: Aze0920/Codex_Credential_Manager
    volumes:
      - ./data:/app/data
      # 勿单独挂载 VERSION 文件（宿主机若误建成目录会导致 compose 启动失败）；由 entrypoint 从 /host-codex/VERSION 同步
      - ./core:/app/core:ro
      - ./tools:/app/tools:ro
      - ./scripts:/app/scripts:ro
      - .:/host-codex
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8766/api/admin/health"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 25s
