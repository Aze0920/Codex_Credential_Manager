name: codex

services:
  codex-web:
    build: .
    container_name: codex-credential-manager
    restart: unless-stopped
    ports:
      - "${PORT:-8766}:8766"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: "8766"
      NODE_EXECUTABLE: /usr/bin/node
      ENABLE_SELF_UPDATE: "1"
      UPDATE_SCRIPT: /app/scripts/update-docker.sh
      HOST_INSTALL_DIR: /host-codex
      GITHUB_REPO: Aze0920/Codex_Credential_Manager
    volumes:
      - ./data:/app/data
      - ./VERSION:/app/VERSION
      - ./core:/app/core:ro
      - ./tools:/app/tools:ro
      - ./scripts:/app/scripts:ro
      - .:/host-codex
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8766/api/admin/health"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 25s
