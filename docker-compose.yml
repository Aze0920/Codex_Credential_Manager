services:
  codex-web:
    build: .
    container_name: codex-credential-manager
    restart: unless-stopped
    ports:
      - "${PORT:-8766}:8766"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: "8766"
      NODE_EXECUTABLE: /usr/bin/node
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8766/api/admin/health"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 25s
